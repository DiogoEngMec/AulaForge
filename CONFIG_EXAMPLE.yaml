project:
  name: "AulaForge"
  output_dir: "./output"
  language: "pt-BR"
  keep_technical_terms_in_english: true

processing:
  mode: "documentation_project"
  batch: true
  sequential: true
  continue_on_error: true
  retry_attempts: 3
  chunk_minutes: 15
  skip_if_unchanged: true
  auto_confirm: true

transcription:
  engine: "whisper-local"
  model: "medium"
  save_raw: true
  save_timestamps: true
  send_raw_to_notion: false

ocr:
  enabled: false              # OCR pode ser lento; opt-in manual
  engine: "local"
  frame_interval_seconds: 5  # 1 frame a cada N segundos
  lang: "por+eng"             # idiomas Tesseract (use + para múltiplos)
  min_text_change_chars: 30   # chars novos mínimos para não deduplicar frame
  save_screenshots_local: true
  send_screenshots_to_notion: false
  show_low_confidence_code_in_notion: true
  detect_code: true
  detect_terminal: true
  detect_screen_type: true
  preprocess_with_opencv: true  # binarização; requer pip install aulaforge[ocr]

llm:
  provider: "ollama"
  model: "qwen3:30b"
  temperature: 0.2
  max_retries: 3

notion:
  enabled: true
  auto_send: true
  mode: "course_page"
  database_id: null # opcional; se definido, tem prioridade sobre database_name
  database_name: "Aulas Processadas"
  token_env_var: "NOTION_TOKEN"
  page_per_course: true
  update_existing_page: true
  lesson_blocks_as_toggle_h1: true
  send_raw_transcript: false
  send_screenshots: false
  request_timeout: 30.0
  max_retries: 3

merge:
  enabled: true               # habilitado por padrão (sem dependências externas)
  window_seconds: 15.0        # janela de associação OCR→transcrição (segundos)
  group_minutes: 10           # agrupamento de blocos no Markdown (minutos)

outputs:
  enabled: true               # habilitado por padrão (sem dependências externas)
  max_implementation_plan_chars: null  # null = sem limite; ex: 5000 para limitar 16_IMPLEMENTATION_PLAN.md
